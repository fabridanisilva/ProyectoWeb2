<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social - Registro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <div class="card-body p-4 p-md-5">
                        <h2 class="text-center mb-4 fw-bold">Bienvenido</h2>
                        
                        <div id="alertaError" class="alert alert-danger d-none" role="alert"></div>

                        <ul class="nav nav-tabs mb-4" id="misPestanas" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-panel" type="button" role="tab">Iniciar Sesión</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link fw-bold" id="registro-tab" data-bs-toggle="tab" data-bs-target="#registro-panel" type="button" role="tab">Registrarse</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="misPestanasContent">
                            
                            <div class="tab-pane fade show active" id="login-panel" role="tabpanel">
                                <form id="formLogin">
                                    <div class="mb-3">
                                        <label class="form-label">Usuario</label>
                                        <input type="text" id="loginUsername" class="form-control" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Contraseña</label>
                                        <input type="password" id="loginPassword" class="form-control" required>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Entrar</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="registro-panel" role="tabpanel">
                                <form id="formRegistro">
                                    <div class="mb-3">
                                        <label class="form-label">Usuario</label>
                                        <input type="text" id="username" class="form-control" required>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col">
                                            <label class="form-label">Nombre</label>
                                            <input type="text" id="nombre" class="form-control" required>
                                        </div>
                                        <div class="col">
                                            <label class="form-label">Apellido</label>
                                            <input type="text" id="apellido" class="form-control" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" id="email" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Edad</label>
                                        <input type="number" id="edad" class="form-control" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Contraseña</label>
                                        <input type="password" id="password" class="form-control" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Registrarse</button>
                                </form>
                            </div>
                        </div>
                        
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de lógica -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
