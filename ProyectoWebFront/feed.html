<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social - Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🔥 Mi Red Social</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="nombreUsuario">Cargando...</span>
                <button class="btn btn-success btn-sm me-2" data-bs-toggle="modal" data-bs-target="#modalPublicacion">+ Nueva Foto</button>
                <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="contenedorPublicaciones">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPublicacion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Crear Publicación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formPublicacion">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" id="pubTitulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea id="pubDescripcion" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL de la Imagen</label>
                            <input type="url" id="pubImagen" class="form-control" placeholder="https://ejemplo.com/foto.jpg" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Etiquetas (separadas por coma)</label>
                            <input type="text" id="pubEtiquetas" class="form-control" placeholder="ej: java, programacion, viaje">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Publicar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
