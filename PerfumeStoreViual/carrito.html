<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand font-weight-bold" href="index.html">Perfumes "El Brother"</a>
        
        <div class="d-flex align-items-center gap-2" id="nav-user-menu">
            </div>
    </div>
</nav>

    <div class="container mt-5">
        <h2 class="mb-4">Tu Carrito de Compras</h2>
        
        <div class="row">
            <div class="col-md-7">
                <div id="lista-carrito" class="bg-white p-4 rounded shadow-sm">
                    <h5 class="text-center text-muted">Cargando...</h5>
                </div>
            </div>

            <div class="col-md-5">
                <div class="bg-white p-4 rounded shadow-sm">
                    <h4>Resumen de Compra</h4>
                    <h2 id="total-carrito" class="text-success font-weight-bold mb-4">$0</h2>
                    
                    <hr>
                    <h5>Datos de Envío</h5>
                    <form id="form-compra">
                        <div class="mb-2">
                            <label>Provincia</label>
                            <input type="text" id="provincia" class="form-control" required placeholder="Ej: San Luis">
                        </div>
                        <div class="mb-2">
                            <label>Ciudad</label>
                            <input type="text" id="ciudad" class="form-control" required placeholder="Ej: Tilisarao">
                        </div>
                        <div class="mb-4">
                            <label>Dirección</label>
                            <input type="text" id="direccion" class="form-control" required placeholder="Ej: Av. Mitre 123">
                        </div>
                        
                        <button type="button" onclick="confirmarCompra()" class="btn btn-dark w-100 btn-lg">
                            Confirmar Pedido 🚀
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="carrito.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
